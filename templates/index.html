<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pokemon Type Game</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>{{ question }}</h1>
    <p class="score">Score: {{ score }}</p>

    <form method="POST" action="/restart" class="top-actions">
      <button type="submit" class="secondary-btn">Start Over</button>
    </form>

    {% if not result %}
      <form method="POST" action="/" class="answer-form">
        <div class="button-grid">
          {% for t in types %}
            <button type="submit" name="user_answer" value="{{ t }}" class="type-btn">
              {{ t }}
            </button>
          {% endfor %}
        </div>
      </form>

      <form method="POST" action="/hint">
        <button type="submit" class="hint-btn">Show Hint</button>
      </form>
    {% endif %}

    {% if result %}
      <p class="result">{{ result }}</p>

      <form method="POST" action="/next">
        <button type="submit" class="next-btn">Next Question</button>
      </form>
    {% endif %}
  </div>
</body>
</html>
